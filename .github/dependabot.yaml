# Dependabot version updates
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # GitHub Actions (workflows in .github/workflows, action.yml in root)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # Helm charts (all first-level chart directories under helm/)
  - package-ecosystem: "helm"
    directories:
      - "/helm/*"
    schedule:
      interval: "weekly"
