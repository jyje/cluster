apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: portainer
spec:
  project: base
  source:
    repoURL: https://github.com/jyje/cluster
    targetRevision: main
    path: helm/portainer/portainer-239.4.0
    helm:
      valueFiles:
        - values.yaml
      valuesObject:
        image:
          tag: 2.39.4
        service:
          type: ClusterIP
        ingress:
          enabled: true
          ingressClassName: nginx
          annotations:
            cert-manager.io/cluster-issuer: nginx-letsencrypt-prod
            nginx.ingress.kubernetes.io/configuration-snippet: |
              more_set_headers "Access-Control-Allow-Origin: $http_origin";
            nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
            nginx.ingress.kubernetes.io/cors-allow-headers: X-Api-Key
            nginx.ingress.kubernetes.io/cors-allow-methods: HEAD
            nginx.ingress.kubernetes.io/enable-cors: "true"
            # Discovered by Homer's Dashboard CR via ingressSelector
            # (matchExpressions: app.kubernetes.io/name in [...]).
            item.homer.rajsingh.info/name: "Portainer"
            item.homer.rajsingh.info/subtitle: "Cluster administration"
            item.homer.rajsingh.info/logo: "https://avatars.githubusercontent.com/u/22225832"
            item.homer.rajsingh.info/tag: "portainer #admin #catalog"
            item.homer.rajsingh.info/type: "Ping"
            service.homer.rajsingh.info/name: "Management"
            service.homer.rajsingh.info/icon: "fas fa-microchip"
          hosts:
            - host: portainer.app.jyje.online
              paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: portainer
                      port:
                        number: 9000
          tls:
            - secretName: portainer.app.jyje.online
              hosts:
                - portainer.app.jyje.online
  destination:
    namespace: portainer
    server: 'https://kubernetes.default.svc'
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated: {}
