apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: litellm
spec:
  project: ai
  source:
    repoURL: https://github.com/jyje/cluster
    targetRevision: main
    path: helm/litellm/litellm-1.89.4
    helm:
      valueFiles:
        - values.yaml
      valuesObject:
        replicaCount: 2

        strategy:
          type: RollingUpdate
          rollingUpdate:
            maxUnavailable: 0
            maxSurge: 1

        deploymentMinReadySeconds: 15

        startupProbe:
          path: /health/readiness
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 10
          successThreshold: 1
          failureThreshold: 24

        readinessProbe:
          path: /health/readiness
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3

        ingress:
          enabled: true
          className: nginx
          annotations:
            cert-manager.io/cluster-issuer: nginx-letsencrypt-prod
            nginx.ingress.kubernetes.io/configuration-snippet: |
              more_set_headers "Access-Control-Allow-Origin: $http_origin";
            nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
            nginx.ingress.kubernetes.io/cors-allow-headers: X-Api-Key
            nginx.ingress.kubernetes.io/cors-allow-methods: HEAD
            nginx.ingress.kubernetes.io/enable-cors: "true"
            # Discovered by Homer's Dashboard CR via ingressSelector
            # (matchExpressions: app.kubernetes.io/name in [...]). litellm's
            # chart stamps app.kubernetes.io/name=litellm, matched there.
            item.homer.rajsingh.info/name: "LiteLLM"
            item.homer.rajsingh.info/subtitle: "LLM API gateway / proxy"
            item.homer.rajsingh.info/logo: "https://raw.githubusercontent.com/googlefonts/noto-emoji/main/svg/emoji_u1f684.svg"
            item.homer.rajsingh.info/tag: "litellm #llm #proxy #gateway #openai"
            item.homer.rajsingh.info/type: "Ping"
            service.homer.rajsingh.info/name: "Applications"
            service.homer.rajsingh.info/icon: "fas fa-rocket"
          hosts:
            - host: litellm.app.jyje.online
              paths:
                - path: /
                  pathType: Prefix
          tls:
            - secretName: litellm.app.jyje.online
              hosts:
                - litellm.app.jyje.online

        image:
          repository: ghcr.io/berriai/litellm
          tag: v1.87.1
        proxy_config:
          model_list:
            # Text Models
            -
              model_name: "upstage/solar-open2"
              litellm_params:
                model: "openai/solar-open2"
                api_base: "https://api.upstage.ai/v2"
                api_key: "os.environ/UPSTAGE_API_KEY"
            -
              model_name: "deepseek-ai/deepseek-v4-flash"
              litellm_params:
                model: "nvidia_nim/deepseek-ai/deepseek-v4-flash"
                api_base: "https://integrate.api.nvidia.com/v1"
                api_key: "os.environ/NIM_API_KEY"
            -
              model_name: "deepseek-ai/deepseek-v4-pro"
              litellm_params:
                model: "nvidia_nim/deepseek-ai/deepseek-v4-pro"
                api_base: "https://integrate.api.nvidia.com/v1"
                api_key: "os.environ/NIM_API_KEY"
            -
              model_name: "google/gemma-4-31b-it"
              litellm_params:
                model: "nvidia_nim/google/gemma-4-31b-it"
                api_base: "https://integrate.api.nvidia.com/v1"
                api_key: "os.environ/NIM_API_KEY"
            -
              model_name: "minimaxai/minimax-m2.7"
              litellm_params:
                model: "nvidia_nim/minimaxai/minimax-m2.7"
                api_base: "https://integrate.api.nvidia.com/v1"
                api_key: "os.environ/NIM_API_KEY"
            -
              model_name: "minimaxai/minimax-m3"
              litellm_params:
                model: "nvidia_nim/minimaxai/minimax-m3"
                api_base: "https://integrate.api.nvidia.com/v1"
                api_key: "os.environ/NIM_API_KEY"
            -
              model_name: "mistralai/mistral-small-4-119b-2603"
              litellm_params:
                model: "nvidia_nim/mistralai/mistral-small-4-119b-2603"
                api_base: "https://integrate.api.nvidia.com/v1"
                api_key: "os.environ/NIM_API_KEY"
                extra_body:
                  reasoning_effort: "high"
            -
              model_name: "moonshotai/kimi-k2.6"
              litellm_params:
                model: "nvidia_nim/moonshotai/kimi-k2.6"
                api_base: "https://integrate.api.nvidia.com/v1"
                api_key: "os.environ/NIM_API_KEY"
                extra_body:
                  chat_template_kwargs:
                    thinking: true
            -
              model_name: "nvidia/nemotron-3-ultra-550b-a55b"
              litellm_params:
                model: "nvidia_nim/nvidia/nemotron-3-ultra-550b-a55b"
                api_base: "https://integrate.api.nvidia.com/v1"
                api_key: "os.environ/NIM_API_KEY"
            -
              model_name: "openai/gpt-oss-120b"
              litellm_params:
                model: "nvidia_nim/openai/gpt-oss-120b"
                api_base: "https://integrate.api.nvidia.com/v1"
                api_key: "os.environ/NIM_API_KEY"
            -
              model_name: "openai/gpt-oss-20b"
              litellm_params:
                model: "nvidia_nim/openai/gpt-oss-20b"
                api_base: "https://integrate.api.nvidia.com/v1"
                api_key: "os.environ/NIM_API_KEY"
            -
              model_name: "qwen/qwen3.5-122b-a10b"
              litellm_params:
                model: "nvidia_nim/qwen/qwen3.5-122b-a10b"
                api_base: "https://integrate.api.nvidia.com/v1"
                api_key: "os.environ/NIM_API_KEY"
            -
              model_name: "stepfun-ai/step-3.7-flash"
              litellm_params:
                model: "nvidia_nim/stepfun-ai/step-3.7-flash"
                api_base: "https://integrate.api.nvidia.com/v1"
                api_key: "os.environ/NIM_API_KEY"
            -
              model_name: "z-ai/glm-5.2"
              litellm_params:
                model: "nvidia_nim/z-ai/glm-5.2"
                api_base: "https://integrate.api.nvidia.com/v1"
                api_key: "os.environ/NIM_API_KEY"

            # GitHub Copilot Models (June)
            # Auth is FILE-based: LiteLLM's github_copilot provider reads the
            # long-lived GitHub token from $GITHUB_COPILOT_TOKEN_DIR/access-token
            # (mounted via subPath from the `github.token` key of litellm-creds),
            # then exchanges it for short-lived Copilot tokens. The api_key
            # litellm_param is ignored by this provider, so it is omitted.
            # Exposed WITHOUT a vendor prefix so downstream clients (hermes-june,
            # provider=litellm) don't misroute it as a built-in copilot provider.
            -
              model_name: "copilot-gpt-4o"
              litellm_params:
                model: "github_copilot/gpt-4o"

            # Image Models
            -
              model_name: "qwen/qwen-image-edit"
              litellm_params:
                model: "openai/qwen/qwen-image-edit"
                api_base: "https://integrate.api.nvidia.com/v1"
                api_key: "os.environ/NIM_API_IMAGE_KEY"
                drop_params: true
                extra_body:
                  steps: 30
                  cfg_scale: 4.0
                  size: "1024x1024"
              model_info:
                type: "image_generation"
            -
              model_name: "qwen/qwen-image"
              litellm_params:
                model: "openai/qwen/qwen-image"
                api_base: "https://integrate.api.nvidia.com/v1"
                api_key: "os.environ/NIM_API_IMAGE_KEY"
                drop_params: true
                extra_body:
                  steps: 30
                  cfg_scale: 4.0
                  size: "1024x1024"
              model_info:
                type: "image_generation"
            -
              model_name: "black-forest-labs/flux.2-klein-4b"
              litellm_params:
                model: "openai/black-forest-labs/flux.2-klein-4b"
                api_base: "http://nvidia-genai-adapter.ollama-system:8080/v1"
                api_key: "os.environ/NIM_API_IMAGE_KEY"
                drop_params: true
                extra_body:
                  steps: 4
                  cfg_scale: 1.0
                  size: "1024x1024"
              model_info:
                type: "image_generation"

            # Embedding Models
            -
              model_name: "nvidia/llama-nemotron-embed-vl-1b-v2"
              litellm_params:
                model: "openai/nvidia/llama-nemotron-embed-vl-1b-v2"
                api_base: "https://integrate.api.nvidia.com/v1"
                api_key: "os.environ/NIM_API_KEY"
                extra_body:
                  input_type: "passage"
                  encoding_format: "float"
              model_info:
                type: "embedding"
            -
              model_name: "nvidia/llama-nemotron-embed-1b-v2"
              litellm_params:
                model: "openai/nvidia/llama-nemotron-embed-1b-v2"
                api_base: "https://integrate.api.nvidia.com/v1"
                api_key: "os.environ/NIM_API_KEY"
                extra_body:
                  input_type: "passage"
                  encoding_format: "float"
              model_info:
                type: "embedding"
          litellm_settings:
            telemetry: false
            turn_off_message_logging: true
        db:
          deployStandalone: false
          database: "litellm"
        postgresql:
          enabled: true
          auth:
            # Bitnami PostgreSQL container hardcodes these key names for existingSecret volume projection
            existingSecret: "litellm-creds"
        masterkeySecretName: "litellm-creds"
        masterkeySecretKey: "litellm.masterkey"
        migrationJob:
          enabled: false
        extraEnvVars:
          - name: DATABASE_HOST
            value: "litellm-pg-rw"
          - name: DATABASE_USERNAME
            value: "litellm"
          - name: DATABASE_PASSWORD
            valueFrom:
              secretKeyRef:
                name: litellm-creds
                key: password
          - name: DATABASE_NAME
            value: "litellm"
          - name: DATABASE_URL
            value: "postgresql://$(DATABASE_USERNAME):$(DATABASE_PASSWORD)@$(DATABASE_HOST)/$(DATABASE_NAME)"
          - name: PROXY_MASTER_KEY
            valueFrom:
              secretKeyRef:
                name: litellm-creds
                key: litellm.masterkey
          - name: UI_USERNAME
            valueFrom:
              secretKeyRef:
                name: litellm-creds
                key: litellm.ui-username
          - name: UI_PASSWORD
            valueFrom:
              secretKeyRef:
                name: litellm-creds
                key: litellm.ui-password
          - name: NIM_API_KEY
            valueFrom:
              secretKeyRef:
                name: litellm-creds
                key: nim.api.key
          - name: NIM_API_IMAGE_KEY
            valueFrom:
              secretKeyRef:
                name: litellm-creds
                key: nim.api.image-key
          - name: OPENAI_API_KEY
            valueFrom:
              secretKeyRef:
                name: litellm-creds
                key: openai.api.key
          - name: UPSTAGE_API_KEY
            valueFrom:
              secretKeyRef:
                name: litellm-creds
                key: upstage.api.key
          - name: DISABLE_METRICS
            value: "True"
          - name: TELEMETRY
            value: "False"
          # Directory where the github_copilot provider reads `access-token`
          # and writes its short-lived `api-key.json` cache (must be writable).
          - name: GITHUB_COPILOT_TOKEN_DIR
            value: /copilot-auth

        # GitHub Copilot (June) token: the long-lived token from litellm-creds
        # (`github.token`) is mounted directly as the read-only `access-token`
        # file via subPath, while the rest of the token dir stays a writable
        # emptyDir so the github_copilot provider can cache the short-lived
        # `api-key.json` it exchanges. No init container needed.
        volumes:
          - name: copilot-auth
            emptyDir: {}
          - name: copilot-token
            secret:
              secretName: litellm-creds
              items:
                - key: github.token
                  path: access-token
        volumeMounts:
          - name: copilot-auth
            mountPath: /copilot-auth
          - name: copilot-token
            mountPath: /copilot-auth/access-token
            subPath: access-token
            readOnly: true

        extraResources:
          # SealedSecret for Litellm
          - apiVersion: bitnami.com/v1alpha1
            kind: SealedSecret
            metadata:
              name: litellm-creds
            spec:
              encryptedData:
                github.token: 
                litellm.masterkey: 
                litellm.ui-password: 
                litellm.ui-username: 
                nim.api.image-key: 
                nim.api.key: 
                openai.api.key: 
                password: 
                postgres-password: 
                upstage.api.key: 
                username: 
              template:
                metadata:
                  name: litellm-creds
                type: Opaque

          # NVIDIA GenAI → OpenAI adapter for non-OpenAI-compatible image models (e.g. flux.2-klein-4b)
          - apiVersion: v1
            kind: ConfigMap
            metadata:
              name: nvidia-genai-adapter
              namespace: ollama-system
            data:
              adapter.py: |
                import time, json, traceback
                import requests
                from fastapi import FastAPI, Request
                from fastapi.responses import JSONResponse

                app = FastAPI()
                GENAI_BASE = "https://ai.api.nvidia.com/v1/genai"

                def parse_size(size):
                    try:
                        w, h = str(size).split("x"); return int(w), int(h)
                    except Exception: return 1024, 1024

                async def read_body(request: Request) -> dict:
                    ct = request.headers.get("content-type", "")
                    raw = await request.body()
                    print(f"[REQ] ct={ct!r} len={len(raw)} body={raw[:500]!r}", flush=True)
                    if raw:
                        try: return json.loads(raw)
                        except Exception: pass
                    try:
                        form = await request.form()
                        return dict(form)
                    except Exception: pass
                    return dict(request.query_params)

                def call_nim(model, nim_payload, auth):
                    url = f"{GENAI_BASE}/{model}"
                    print(f"[NIM] POST {url} {json.dumps(nim_payload)[:300]}", flush=True)
                    resp = requests.post(url,
                        headers={"Authorization": auth,
                                 "Content-Type": "application/json",
                                 "Accept": "application/json"},
                        json=nim_payload, timeout=120)
                    print(f"[NIM] {resp.status_code} {resp.text[:300]}", flush=True)
                    return resp

                @app.post("/v1/images/generations")
                async def image_generation(request: Request):
                    try:
                        body = await read_body(request)
                        auth = request.headers.get("Authorization", "")
                        model = body.get("model", "black-forest-labs/flux.2-klein-4b")
                        prompt = body.get("prompt", "")
                        size = body.get("size", "1024x1024")
                        steps = int(body.get("steps", 4))
                        cfg_scale = float(body.get("cfg_scale", 1.0))
                        seed = int(body.get("seed", 0))
                        w, h = parse_size(size)
                        nim_payload = {"prompt": prompt[:800], "width": w, "height": h,
                                       "steps": steps, "cfg_scale": cfg_scale, "seed": seed}
                        if body.get("negative_prompt"):
                            nim_payload["negative_prompt"] = str(body["negative_prompt"])[:500]
                        resp = call_nim(model, nim_payload, auth)
                        if not resp.ok:
                            return JSONResponse(status_code=resp.status_code,
                                content={"error": {"message": resp.text[:500], "type": "upstream_error"}})
                        artifacts = resp.json().get("artifacts", [])
                        return {"created": int(time.time()),
                                "data": [{"b64_json": a["base64"]} for a in artifacts]}
                    except Exception as e:
                        print(f"[ERR] {traceback.format_exc()}", flush=True)
                        return JSONResponse(status_code=500,
                            content={"error": {"message": str(e), "type": "adapter_error"}})

                @app.post("/v1/images/edits")
                async def image_edit(request: Request):
                    try:
                        body = await read_body(request)
                        auth = request.headers.get("Authorization", "")
                        model = body.get("model", "black-forest-labs/flux.2-klein-4b")
                        prompt = body.get("prompt", "")
                        image = body.get("image")
                        size = body.get("size", "1024x1024")
                        steps = int(body.get("steps", 4))
                        cfg_scale = float(body.get("cfg_scale", 1.0))
                        seed = int(body.get("seed", 0))
                        w, h = parse_size(size)
                        nim_payload = {"prompt": prompt[:800], "width": w, "height": h,
                                       "steps": steps, "cfg_scale": cfg_scale, "seed": seed}
                        if image:
                            nim_payload["image"] = image if isinstance(image, list) else [image]
                        if body.get("negative_prompt"):
                            nim_payload["negative_prompt"] = str(body["negative_prompt"])[:500]
                        resp = call_nim(model, nim_payload, auth)
                        if not resp.ok:
                            return JSONResponse(status_code=resp.status_code,
                                content={"error": {"message": resp.text[:500], "type": "upstream_error"}})
                        artifacts = resp.json().get("artifacts", [])
                        return {"created": int(time.time()),
                                "data": [{"b64_json": a["base64"]} for a in artifacts]}
                    except Exception as e:
                        print(f"[ERR] {traceback.format_exc()}", flush=True)
                        return JSONResponse(status_code=500,
                            content={"error": {"message": str(e), "type": "adapter_error"}})

                @app.get("/health")
                async def health():
                    return {"status": "ok"}

          - apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: nvidia-genai-adapter
              namespace: ollama-system
            spec:
              replicas: 1
              selector:
                matchLabels:
                  app: nvidia-genai-adapter
              template:
                metadata:
                  labels:
                    app: nvidia-genai-adapter
                spec:
                  volumes:
                    - name: script
                      configMap:
                        name: nvidia-genai-adapter
                  containers:
                    - name: adapter
                      image: python:3.11-slim
                      command: ["/bin/sh", "-c"]
                      args:
                        - pip install fastapi uvicorn requests -q && uvicorn adapter:app --host 0.0.0.0 --port 8080
                      workingDir: /app
                      volumeMounts:
                        - name: script
                          mountPath: /app
                      ports:
                        - containerPort: 8080
                      resources:
                        requests:
                          memory: 64Mi
                        limits:
                          memory: 256Mi
                      readinessProbe:
                        httpGet:
                          path: /health
                          port: 8080
                        initialDelaySeconds: 15
                        periodSeconds: 10

          - apiVersion: v1
            kind: Service
            metadata:
              name: nvidia-genai-adapter
              namespace: ollama-system
            spec:
              selector:
                app: nvidia-genai-adapter
              ports:
                - port: 8080
                  targetPort: 8080

          # CloudNativePG PostgreSQL cluster for Litellm
          - apiVersion: postgresql.cnpg.io/v1
            kind: Cluster
            metadata:
              name: litellm-pg
            spec:
              instances: 3
              storage:
                size: 1Gi
              bootstrap:
                initdb:
                  database: litellm
                  owner: litellm
                  secret:
                    name: litellm-creds
              # Prevent repeated timeline divergence caused by CNPG's aggressive defaults:
              # - wal_sender/receiver_timeout: 5s causes false failovers on K8s network blips
              # - wal_keep_size: 512MB is too small for pg_rewind after multiple failovers
              topologySpreadConstraints:
                - maxSkew: 1
                  topologyKey: kubernetes.io/hostname
                  whenUnsatisfiable: DoNotSchedule
                  labelSelector:
                    matchLabels:
                      cnpg.io/cluster: litellm-pg
              failoverDelay: 30
              postgresql:
                parameters:
                  wal_sender_timeout: 60s
                  wal_receiver_timeout: 60s
                  wal_keep_size: 2048MB
  destination:
    namespace: ollama-system
    server: 'https://kubernetes.default.svc'
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated: {}
