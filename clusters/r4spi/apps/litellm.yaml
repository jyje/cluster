apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: litellm
spec:
  project: ai
  source:
    repoURL: https://github.com/jyje/cluster
    targetRevision: main
    path: helm/litellm/litellm-1.82.3
    helm:
      valueFiles:
        - values.yaml
      valuesObject:
        image:
          repository: ghcr.io/berriai/litellm
          tag: v1.82.3
        proxy_config:
          model_list:
            - model_name: "nvidia/nemotron-3-super-120b-a12b"
              litellm_params:
                model: "nvidia_nim/nvidia/nemotron-3-super-120b-a12b"
                api_base: "https://integrate.api.nvidia.com/v1"
                api_key: "os.environ/NIM_API_KEY"
            - model_name: "openai/gpt-oss-120b"
              litellm_params:
                model: "nvidia_nim/openai/gpt-oss-120b"
                api_base: "https://integrate.api.nvidia.com/v1"
                api_key: "os.environ/NIM_API_KEY"
            - model_name: "nvidia/llama-nemotron-embed-vl-1b-v2"
              litellm_params:
                model: "nvidia_nim/nvidia/llama-nemotron-embed-vl-1b-v2"
                api_base: "https://integrate.api.nvidia.com/v1"
                api_key: "os.environ/NIM_API_KEY"
                extra_body:
                  input_type: "passage"
                  modality: "text"
            - model_name: "nvidia/llama-nemotron-embed-1b-v2"
              litellm_params:
                model: "nvidia_nim/nvidia/llama-nemotron-embed-1b-v2"
                api_base: "https://integrate.api.nvidia.com/v1"
                api_key: "os.environ/NIM_API_KEY"
                extra_body:
                  input_type: "passage"
          litellm_settings:
            telemetry: false
            turn_off_message_logging: true
        postgresql:
          auth:
            # Bitnami PostgreSQL container hardcodes these key names for existingSecret volume projection
            existingSecret: "litellm-creds"
        masterkeySecretName: "litellm-creds"
        masterkeySecretKey: "litellm.masterkey"
        migrationJob:
          enabled: false
        extraEnvVars:
          - name: DATABASE_URL
            value: "postgresql://litellm:$(DATABASE_PASSWORD)@$(DATABASE_HOST)/litellm"
          - name: DATABASE_PASSWORD
            valueFrom:
              secretKeyRef:
                name: litellm-creds
                key: password # Must match hardcoded 'password' key for DB alignment
          - name: NIM_API_KEY
            valueFrom:
              secretKeyRef:
                name: litellm-creds
                key: nim.api.key
          - name: OPENAI_API_KEY
            valueFrom:
              secretKeyRef:
                name: litellm-creds
                key: openai.api.key
          - name: DISABLE_METRICS
            value: "True"
          - name: TELEMETRY
            value: "False"
        extraResources:
          - apiVersion: bitnami.com/v1alpha1
            kind: SealedSecret
            metadata:
              name: litellm-creds
            spec:
              encryptedData:
                litellm.masterkey: 
                nim.api.key: 
                openai.api.key: 
                # These keys (password, postgres-password) are hardcoded requirements for Bitnami PostgreSQL initialization
                postgres-password: 
                password: 
              template:
                metadata:
                  name: litellm-creds
                type: Opaque
  destination:
    namespace: ollama-system
    server: 'https://kubernetes.default.svc'
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated: {}
