apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authentik
spec:
  project: base
  source:
    repoURL: https://github.com/jyje/cluster
    targetRevision: main
    path: helm/authentik/authentik-2026.5.5
    helm:
      valuesObject:
        authentik:
          postgresql:
            host: authentik-pg-rw.authentik
            name: authentik
            # user/password provided via server.env/worker.env below, sourced
            # from the CNPG-generated authentik-pg-app secret (same pattern
            # as grafana-pg/litellm-pg). Blank the chart's own "authentik"
            # user default so this base secret doesn't emit a redundant,
            # unused AUTHENTIK_POSTGRESQL__USER key.
            user: ""

        blueprints:
          # Declares the Google OAuth Source (client ID/secret + Blueprint
          # YAML live together in the authentik-google-source SealedSecret
          # below). Only keys ending in .yaml are picked up.
          secrets:
            - authentik-google-source
          # RBAC group hierarchy — no credentials involved, so a plain
          # ConfigMap (not a SealedSecret) is the right home for it.
          configMaps:
            - authentik-rbac-groups

        server:
          env:
            - name: AUTHENTIK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: authentik-creds
                  key: secret-key
            - name: AUTHENTIK_POSTGRESQL__USER
              valueFrom:
                secretKeyRef:
                  name: authentik-pg-app
                  key: username
            - name: AUTHENTIK_POSTGRESQL__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: authentik-pg-app
                  key: password
            # Codifies the initial admin (akadmin) email/password that was
            # set live via the OOBE flow. The bootstrap blueprint's
            # admin-user entry is state:created (create-only), so this
            # doesn't touch the live account — it's a disaster-recovery
            # safety net: a fresh install reproduces the same admin login
            # instead of ending up with no usable admin credentials.
            - name: AUTHENTIK_BOOTSTRAP_EMAIL
              valueFrom:
                secretKeyRef:
                  name: authentik-bootstrap-creds
                  key: email
            - name: AUTHENTIK_BOOTSTRAP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: authentik-bootstrap-creds
                  key: password
          ingress:
            enabled: true
            ingressClassName: nginx
            annotations:
              cert-manager.io/cluster-issuer: nginx-letsencrypt-prod
              # Without this, Homer's browser-side Ping check is blocked by
              # CORS and shows the app as offline even though it's healthy
              # (same annotations as every other "online" card: Grafana,
              # Argo CD, Portainer).
              nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
              nginx.ingress.kubernetes.io/cors-allow-headers: X-Api-Key
              nginx.ingress.kubernetes.io/cors-allow-methods: HEAD
              nginx.ingress.kubernetes.io/enable-cors: "true"
              # Discovered by Homer's Dashboard CR via ingressSelector
              # (matchExpressions: app.kubernetes.io/name in [...]).
              item.homer.rajsingh.info/name: "authentik"
              item.homer.rajsingh.info/subtitle: "Cluster SSO"
              item.homer.rajsingh.info/logo: "https://goauthentik.io/img/icon.png"
              item.homer.rajsingh.info/tag: "authentik #sso #oidc #iam"
              item.homer.rajsingh.info/type: "Ping"
              # Grouped with Argo CD/Portainer — occasionally-visited admin
              # tools, not daily-use apps.
              service.homer.rajsingh.info/name: "Management"
              service.homer.rajsingh.info/icon: "fas fa-key"
            hosts:
              - authentik.app.jyje.online
            tls:
              - secretName: authentik.app.jyje.online
                hosts:
                  - authentik.app.jyje.online

        worker:
          env:
            - name: AUTHENTIK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: authentik-creds
                  key: secret-key
            - name: AUTHENTIK_POSTGRESQL__USER
              valueFrom:
                secretKeyRef:
                  name: authentik-pg-app
                  key: username
            - name: AUTHENTIK_POSTGRESQL__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: authentik-pg-app
                  key: password
            # See server.env above — same disaster-recovery rationale. The
            # bootstrap blueprint is actually applied by this worker.
            - name: AUTHENTIK_BOOTSTRAP_EMAIL
              valueFrom:
                secretKeyRef:
                  name: authentik-bootstrap-creds
                  key: email
            - name: AUTHENTIK_BOOTSTRAP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: authentik-bootstrap-creds
                  key: password

        additionalObjects:
          - apiVersion: v1
            kind: ConfigMap
            metadata:
              name: authentik-rbac-groups
            data:
              rbac-groups.yaml: |
                version: 1
                metadata:
                  name: RBAC Group Hierarchy
                entries:
                  - identifiers:
                      name: Unknown
                    model: authentik_core.group
                    state: present
                    id: group-unknown
                    attrs:
                      is_superuser: false

                  - identifiers:
                      name: Viewer
                    model: authentik_core.group
                    state: present
                    id: group-viewer
                    attrs:
                      is_superuser: false
                      parents:
                        - !KeyOf group-unknown

                  - identifiers:
                      name: Developer
                    model: authentik_core.group
                    state: present
                    id: group-developer
                    attrs:
                      is_superuser: false
                      parents:
                        - !KeyOf group-viewer

                  - identifiers:
                      name: AuthentikAdmin
                    model: authentik_core.group
                    state: present
                    id: group-authentikadmin
                    attrs:
                      is_superuser: true
                      parents:
                        - !KeyOf group-developer

                  - identifiers:
                      name: ClusterAdmin
                    model: authentik_core.group
                    state: present
                    id: group-clusteradmin
                    attrs:
                      is_superuser: true
                      parents:
                        - !KeyOf group-authentikadmin

                  # Every newly-enrolled user (any Google login) lands in
                  # Unknown by default, with zero permissions, until
                  # manually promoted.
                  - identifiers:
                      name: default-source-enrollment-write
                    model: authentik_stages_user_write.userwritestage
                    state: present
                    attrs:
                      create_users_group: !KeyOf group-unknown

                  # akadmin: authentik-admin scope only, not cluster-admin.
                  - identifiers:
                      username: akadmin
                    model: authentik_core.user
                    state: present
                    attrs:
                      groups:
                        - !KeyOf group-authentikadmin

                  # jyje: starts at Viewer for now (was ClusterAdmin) —
                  # promotion to the top tier happens later, deliberately,
                  # once the Unknown→Viewer→...→ClusterAdmin flow itself
                  # has been exercised end-to-end.
                  - identifiers:
                      username: jyje
                    model: authentik_core.user
                    state: present
                    attrs:
                      groups:
                        - !KeyOf group-viewer

          - apiVersion: postgresql.cnpg.io/v1
            kind: Cluster
            metadata:
              name: authentik-pg
            spec:
              instances: 3
              storage:
                size: 2Gi
              bootstrap:
                initdb:
                  database: authentik
                  owner: authentik
              topologySpreadConstraints:
                - maxSkew: 1
                  topologyKey: kubernetes.io/hostname
                  whenUnsatisfiable: DoNotSchedule
                  labelSelector:
                    matchLabels:
                      cnpg.io/cluster: authentik-pg
              failoverDelay: 30
              postgresql:
                parameters:
                  wal_sender_timeout: 60s
                  wal_receiver_timeout: 60s
                  wal_keep_size: 2048MB
                  # Self-heal a known authentik bug (0056_user_roles migration
                  # can leave a client idle-in-transaction indefinitely,
                  # blocking DDL — see goauthentik/authentik#20734). Only
                  # affects sessions idle *between* queries inside an open
                  # transaction, never an actively-running one, so this
                  # can't kill a genuinely slow migration.
                  idle_in_transaction_session_timeout: 10min

          - apiVersion: bitnami.com/v1alpha1
            kind: SealedSecret
            metadata:
              name: authentik-bootstrap-creds
            spec:
              encryptedData:
                email: 
                password: 
              template:
                metadata:
                  name: authentik-bootstrap-creds
                type: Opaque

          - apiVersion: bitnami.com/v1alpha1
            kind: SealedSecret
            metadata:
              name: authentik-creds
            spec:
              encryptedData:
                secret-key: 
              template:
                metadata:
                  name: authentik-creds
                type: Opaque

          - apiVersion: bitnami.com/v1alpha1
            kind: SealedSecret
            metadata:
              name: authentik-google-source
            spec:
              encryptedData:
                google-source.yaml: 
              template:
                metadata:
                  name: authentik-google-source
                type: Opaque

  destination:
    server: https://kubernetes.default.svc
    namespace: authentik
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
