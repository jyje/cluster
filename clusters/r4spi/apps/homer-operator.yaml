apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homer-operator
spec:
  project: base
  source:
    repoURL: https://github.com/jyje/cluster
    targetRevision: main
    path: helm/homer-operator/homer-operator-1.2.0
    helm:
      valueFiles:
        - values.yaml
      valuesObject:
        operator:
          enableGatewayAPI: false
          metrics:
            # gcr.io/kubebuilder/kube-rbac-proxy:v0.16.0 no longer resolves (image
            # removed upstream). The proxy sidecar is gated by metrics.enabled
            # (not secureMetrics, which only toggles the --metrics-secure flag),
            # so metrics must be disabled entirely to avoid pulling that image.
            enabled: false

        extraResources:
          - apiVersion: homer.rajsingh.info/v1alpha1
            kind: Dashboard
            metadata:
              name: homer-operator
              namespace: "{{ .Release.Namespace }}"
            spec:
              domainFilters:
                - "app.jyje.online"
              homerConfig:
                title: "jyje Cluster"
                subtitle: "Auto-discovered services"
                header: true

          # Chart has no built-in ingress template; the operator names the
          # generated Service "<dashboard-name>-homer" (confirmed post-deploy).
          - apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              name: homer-operator
              namespace: "{{ .Release.Namespace }}"
              annotations:
                cert-manager.io/cluster-issuer: nginx-letsencrypt-prod
            spec:
              ingressClassName: nginx
              tls:
                - secretName: homer-operator.app.jyje.online
                  hosts:
                    - homer-operator.app.jyje.online
              rules:
                - host: homer-operator.app.jyje.online
                  http:
                    paths:
                      - path: /
                        pathType: Prefix
                        backend:
                          service:
                            name: homer-operator-homer
                            port:
                              number: 80

  destination:
    server: https://kubernetes.default.svc
    namespace: homer-operator
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
