apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homer-operator
spec:
  project: base
  source:
    repoURL: https://github.com/jyje/cluster
    targetRevision: main
    path: helm/homer-operator/homer-operator-1.2.0
    helm:
      valueFiles:
        - values.yaml
      valuesObject:
        operator:
          enableGatewayAPI: false
          metrics:
            # gcr.io/kubebuilder/kube-rbac-proxy:v0.16.0 no longer resolves (image
            # removed upstream). The proxy sidecar is gated by metrics.enabled
            # (not secureMetrics, which only toggles the --metrics-secure flag),
            # so metrics must be disabled entirely to avoid pulling that image.
            enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: homer-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
