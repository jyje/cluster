apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: base
  source:
    repoURL: https://github.com/jyje/cluster
    targetRevision: main
    path: helm/prometheus/kube-prometheus-stack-86.2.0
    helm:
      valuesObject:
        grafana:
          enabled: false

        prometheus:
          prometheusSpec:
            replicas: 1
            retention: 7d
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: subdir-usb
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 20Gi

        alertmanager:
          alertmanagerSpec:
            replicas: 1
            storage:
              volumeClaimTemplate:
                spec:
                  storageClassName: subdir-usb
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 2Gi

        kubeEtcd:
          enabled: false

        prometheusOperator:
          admissionWebhooks:
            patch:
              enabled: true

  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # Several Prometheus Operator CRDs (prometheuses, alertmanagers, etc.)
      # exceed the 262144-byte last-applied-configuration annotation limit
      # under client-side apply, leaving them unregistered and blocking the
      # Prometheus/Alertmanager custom resources from ever syncing.
      - ServerSideApply=true
