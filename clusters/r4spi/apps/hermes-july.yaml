apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hermes-july
  namespace: argocd
spec:
  project: ai
  source:
    repoURL: oci://ghcr.io/jyje/hermes-agent-helm/hermes-agent
    targetRevision: 0.5.1
    path: .
    helm:
      valuesObject:
        fullnameOverride: hermes-july
        config:
          # Hermes' built-in GitHub Copilot provider. GitHub's Copilot API
          # rejects PATs, so it needs a gho_/ghu_ OAuth token. That token is
          # minted at startup by the chart-native auth.deviceFlow init
          # container (RFC 8628 device grant): it posts the verification
          # link+code to Discord for mobile auth, then writes
          # COPILOT_GITHUB_TOKEN into $HERMES_HOME/.env on the PVC, where
          # Hermes reads it. The token is NOT sealed here.
          model:
            provider: copilot
            default: gpt-4o
          terminal:
            backend: local
          agent:
            # Injected into the system prompt as agent.environment_hint. Tells
            # this bot who its partner is and how to hand the conversation over
            # by @mentioning the partner bot's Discord user ID. The closing
            # guidance is the loop brake: Hermes has no built-in bot-to-bot
            # ping-pong limiter, so the agents must stop mentioning each other
            # once a topic is exhausted.
            environment_hint: |
              You are "july", one of two collaborating Hermes agents living in
              this Discord server. Your partner agent is "june", whose Discord
              user ID is 1520295553768882246. To hand the conversation to june,
              put an explicit <@1520295553768882246> mention in the BODY of your
              message. Only mention june when you have something substantive to
              say or genuinely need their input. When a topic reaches a natural
              conclusion, do NOT mention june at all — address the human instead
              and end your turn — so the exchange stops. Never send a filler,
              acknowledgement, or "let me know if you need anything" message that
              mentions june; that only restarts the loop.
        # Chart-native OAuth device-flow login (replaces the old temp
        # copilot-login Job). Reuses the Discord bot creds below to deliver
        # the verification prompt.
        auth:
          deviceFlow:
            enabled: true
            provider: github-copilot
            notify: discord
        nodeSelector:
          app.jyje.online/raspi.type: 5b
        # Multi-agent collaboration knobs. DISCORD_ALLOW_BOTS must be a real
        # env var: the Discord adapter reads os.getenv("DISCORD_ALLOW_BOTS")
        # directly and the config.yaml discord: block is NOT bridged to it
        # (unlike require_mention / allowed_channels). "mentions" = respond to
        # the partner bot only when it @mentions us, which is what makes the
        # june<->july handoff work while keeping random bots out.
        # DISCORD_THREAD_REQUIRE_MENTION keeps multi-bot threads sane: without
        # it, every bot already in a thread fires on every message.
        extraEnv:
          - name: DISCORD_ALLOW_BOTS
            value: "mentions"
          - name: DISCORD_THREAD_REQUIRE_MENTION
            value: "true"
          # Loop brake. Discord counts a reply-reference as a mention, so a bot
          # replying to its partner auto-pings it (replied_user) — that ping
          # satisfies the DISCORD_ALLOW_BOTS=mentions gate and the two bots
          # ping-pong forever even when neither @mentions the other in the body.
          # REPLY_TO_MODE=off stops the adapter from attaching a reply reference;
          # ALLOW_MENTION_REPLIED_USER=false is the belt-and-suspenders guard.
          # Net effect: a partner only fires on an EXPLICIT <@id> in the message
          # body, so the "stop mentioning when done" prompt actually ends the run.
          - name: DISCORD_REPLY_TO_MODE
            value: "off"
          - name: DISCORD_ALLOW_MENTION_REPLIED_USER
            value: "false"
        extraEnvFrom:
          - secretRef:
              name: hermes-agent-creds
        extraResources:
          - apiVersion: bitnami.com/v1alpha1
            kind: SealedSecret
            metadata:
              name: hermes-agent-creds
            spec:
              encryptedData:
                # NOTE: COPILOT_GITHUB_TOKEN is intentionally NOT here — it is
                # obtained at runtime via the auth.deviceFlow init container and
                # stored in $HERMES_HOME/.env on the PVC.
                DISCORD_ALLOWED_USERS: 
                DISCORD_BOT_TOKEN: 
                DISCORD_HOME_CHANNEL: 
              template:
                metadata:
                  name: hermes-agent-creds
                type: Opaque
  destination:
    server: https://kubernetes.default.svc
    namespace: hermes-july
  syncPolicy:
    automated: {}
    syncOptions:
      - CreateNamespace=true
