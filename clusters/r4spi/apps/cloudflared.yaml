apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudflared
spec:
  project: default
  source:
    repoURL: https://github.com/jyje/cluster
    targetRevision: main
    path: helm/cloudflare/cloudflare-tunnel-remote-0.1.2-custom
    helm:
      valuesObject:
        replicaCount: 2
        cloudflare:
          secretName: cloudflared-credentials
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 128Mi
        extraResources:
          - apiVersion: bitnami.com/v1alpha1
            kind: SealedSecret
            metadata:
              name: cloudflared-credentials
            spec:
              encryptedData:
                tunnelToken: 
              template:
                metadata:
                  name: cloudflared-credentials
                type: Opaque
  destination:
    namespace: cloudflare
    server: 'https://kubernetes.default.svc'
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated: {}
