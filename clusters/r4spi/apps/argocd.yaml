---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
spec:
  project: base
  source:
    repoURL: https://github.com/jyje/cluster
    targetRevision: main
    path: helm/argo/argo-cd-9.7.1
    helm:
      valuesObject:
        fullnameOverride: argocd
        global:
          domain: cd.app.jyje.online
          image:
            repository: quay.io/argoproj/argocd
            tag: "v3.3.9"
        configs:
          params:
            server.insecure: true
          secret:
            argocdServerAdminPassword: "$2a$10$Fxz3iaT9JpTioBr8vPRvYONv5kRrdxfX1KHck46ueCPMl.Qmr.Rhq"
            argocdServerAdminPasswordMtime: "2025-10-07T07:31:00Z"
          cm:
            # SSO via authentik (which itself brokers Google login). The
            # client secret lives in a separate, labeled SealedSecret
            # (argocd-authentik-oidc, see extraObjects below) rather than
            # this chart's own argocd-secret.
            oidc.config: |
              name: authentik
              issuer: https://authentik.app.jyje.online/application/o/argocd/
              clientID: argocd
              clientSecret: $argocd-authentik-oidc:clientSecret
              requestedScopes:
                - openid
                - profile
                - email
                - groups
          rbac:
            # Mirrors the authentik RBAC group hierarchy. The groups claim
            # includes each user's full ancestor chain, so a Developer-tier
            # (or higher) member's token already contains "Developer" and
            # "Viewer" — only the top tier needs an explicit binding here.
            # Developer is allowed on every project by default, with
            # default/base explicitly denied (deny wins over allow). This
            # means new projects are visible to Developer automatically,
            # while default/base stay blocked regardless.
            policy.default: ""
            policy.csv: |
              p, role:developer, projects, get, *, allow
              p, role:developer, projects, get, default, deny
              p, role:developer, projects, get, base, deny
              p, role:developer, applications, get, */*, allow
              p, role:developer, applications, sync, */*, allow
              p, role:developer, applications, action/*, */*, allow
              p, role:developer, applications, get, default/*, deny
              p, role:developer, applications, sync, default/*, deny
              p, role:developer, applications, action/*, default/*, deny
              p, role:developer, applications, get, base/*, deny
              p, role:developer, applications, sync, base/*, deny
              p, role:developer, applications, action/*, base/*, deny
              g, ClusterAdmin, role:admin
              g, Developer, role:developer
              g, Viewer, role:readonly
        controller:
          replicas: 2
          metrics:
            enabled: true
        dex:
          enabled: false
        server:
          replicas: 2
          ingress:
            enabled: true
            annotations:
              cert-manager.io/cluster-issuer: nginx-letsencrypt-prod
              nginx.ingress.kubernetes.io/configuration-snippet: |
                more_set_headers "Access-Control-Allow-Origin: $http_origin";
              nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
              nginx.ingress.kubernetes.io/cors-allow-headers: X-Api-Key
              nginx.ingress.kubernetes.io/cors-allow-methods: HEAD
              nginx.ingress.kubernetes.io/enable-cors: "true"
              # Discovered by Homer's Dashboard CR via ingressSelector
              # (matchExpressions: app.kubernetes.io/name in [...]).
              item.homer.rajsingh.info/name: "Argo CD"
              item.homer.rajsingh.info/subtitle: "App deployment"
              item.homer.rajsingh.info/logo: "https://argo-cd.readthedocs.io/en/stable/assets/logo.png"
              item.homer.rajsingh.info/tag: "argocd #argo #gitops #cicd"
              item.homer.rajsingh.info/type: "Ping"
              service.homer.rajsingh.info/name: "3. Management"
              service.homer.rajsingh.info/icon: "fas fa-microchip"
            ingressClassName: nginx
            tls: true
        repoServer:
          replicas: 2
        extraObjects:
          - apiVersion: argoproj.io/v1alpha1
            kind: AppProject
            metadata:
              name: base
            spec:
              clusterResourceWhitelist:
                - group: '*'
                  kind: '*'
              destinations:
                - namespace: '*'
                  server: https://kubernetes.default.svc
              sourceRepos:
                - '*'
          - apiVersion: argoproj.io/v1alpha1
            kind: AppProject
            metadata:
              name: ai
            spec:
              clusterResourceWhitelist:
                - group: '*'
                  kind: '*'
              destinations:
                - namespace: '*'
                  server: https://kubernetes.default.svc
              sourceRepos:
                - '*'
          - apiVersion: argoproj.io/v1alpha1
            kind: AppProject
            metadata:
              name: default
            spec:
              clusterResourceWhitelist:
                - group: '*'
                  kind: '*'
              destinations:
                - namespace: '*'
                  server: https://kubernetes.default.svc
              sourceRepos:
                - '*'
          - apiVersion: bitnami.com/v1alpha1
            kind: SealedSecret
            metadata:
              name: argocd-authentik-oidc
            spec:
              encryptedData:
                clientSecret: 
              template:
                metadata:
                  name: argocd-authentik-oidc
                  labels:
                    app.kubernetes.io/part-of: argocd
                type: Opaque
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
