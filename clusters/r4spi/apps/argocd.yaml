---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
spec:
  project: base
  source:
    repoURL: https://github.com/jyje/cluster
    targetRevision: main
    path: helm/argo/argo-cd-9.5.11
    helm:
      valuesObject:
        fullnameOverride: argocd
        global:
          domain: cd.app.jyje.online
          image:
            repository: quay.io/argoproj/argocd
            tag: "v3.3.9"
        configs:
          params:
            server.insecure: true
          secret:
            argocdServerAdminPassword: "$2a$10$Fxz3iaT9JpTioBr8vPRvYONv5kRrdxfX1KHck46ueCPMl.Qmr.Rhq"
            argocdServerAdminPasswordMtime: "2025-10-07T07:31:00Z"
        controller:
          replicas: 2
          metrics:
            enabled: true
        dex:
          enabled: false
        server:
          replicas: 2
          ingress:
            enabled: true
            annotations:
              cert-manager.io/cluster-issuer: nginx-letsencrypt-prod
              nginx.ingress.kubernetes.io/configuration-snippet: |
                more_set_headers "Access-Control-Allow-Origin: $http_origin";
              nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
              nginx.ingress.kubernetes.io/cors-allow-headers: X-Api-Key
              nginx.ingress.kubernetes.io/cors-allow-methods: HEAD
              nginx.ingress.kubernetes.io/enable-cors: "true"
              # Discovered by Homer's Dashboard CR via ingressSelector
              # (matchExpressions: app.kubernetes.io/name in [...]).
              item.homer.rajsingh.info/name: "Argo CD"
              item.homer.rajsingh.info/subtitle: "App deployment"
              item.homer.rajsingh.info/logo: "https://argo-cd.readthedocs.io/en/stable/assets/logo.png"
              item.homer.rajsingh.info/tag: "argocd #argo #gitops #cicd"
              item.homer.rajsingh.info/type: "Ping"
              service.homer.rajsingh.info/name: "Management"
              service.homer.rajsingh.info/icon: "fas fa-microchip"
            ingressClassName: nginx
            tls: true
        repoServer:
          replicas: 2
        extraObjects:
          - apiVersion: argoproj.io/v1alpha1
            kind: AppProject
            metadata:
              name: base
            spec:
              clusterResourceWhitelist:
                - group: '*'
                  kind: '*'
              destinations:
                - namespace: '*'
                  server: https://kubernetes.default.svc
              sourceRepos:
                - '*'
          - apiVersion: argoproj.io/v1alpha1
            kind: AppProject
            metadata:
              name: ai
            spec:
              clusterResourceWhitelist:
                - group: '*'
                  kind: '*'
              destinations:
                - namespace: '*'
                  server: https://kubernetes.default.svc
              sourceRepos:
                - '*'
          - apiVersion: argoproj.io/v1alpha1
            kind: AppProject
            metadata:
              name: default
            spec:
              clusterResourceWhitelist:
                - group: '*'
                  kind: '*'
              destinations:
                - namespace: '*'
                  server: https://kubernetes.default.svc
              sourceRepos:
                - '*'
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
