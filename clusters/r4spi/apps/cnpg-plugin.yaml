---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cnpg-plugin-barman-cloud
spec:
  project: base
  source:
    repoURL: https://github.com/jyje/cluster
    targetRevision: main
    path: helm/cnpg/plugin-barman-cloud-0.6.0
    helm:
      valueFiles:
        - values.yaml
  destination:
    namespace: cnpg-system
    server: 'https://kubernetes.default.svc'
  syncPolicy:
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
    automated: {}
