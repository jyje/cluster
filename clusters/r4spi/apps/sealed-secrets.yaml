apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
spec:
  project: base
  source:
    repoURL: https://github.com/jyje/cluster
    targetRevision: main
    path: helm/sealed-secrets/sealed-secrets-2.18.6
    helm:
      valuesObject:
        # Match kubeseal's built-in defaults (controller-name=sealed-secrets-controller,
        # controller-namespace=kube-system) so `kubeseal` works without extra flags.
        fullnameOverride: sealed-secrets-controller
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated: {}
