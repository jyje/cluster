---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homer
spec:
  project: base
  source:
    repoURL: https://github.com/jyje/cluster
    targetRevision: main
    path: helm/homer-k8s/homer-k8s-0.5.1
    helm:
      valueFiles:
        - values.yaml
      valuesObject:
        image:
          repository: bananaops/homer-k8s
          tag: 0.3.4
        fullnameOverride: homer
        ingress:
          enabled: false
        homer:
          image:
            repository: b4bz/homer
            tag: v25.11.1
        extraResources:
          - apiVersion: v1
            kind: Namespace
            metadata:
              name: homer-system
              labels:
                istio.io/dataplane-mode: ambient
          - apiVersion: gateway.networking.k8s.io/v1
            kind: HTTPRoute
            metadata:
              name: homer
              namespace: homer-system
            spec:
              parentRefs:
                - name: istio-gateway
                  namespace: istio-gateway
                  sectionName: https-homer
              hostnames:
                - homer.app.jyje.online
              rules:
                - backendRefs:
                    - name: homer
                      port: 8080
  destination:
    namespace: homer-system
    server: 'https://kubernetes.default.svc'
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated: {}
