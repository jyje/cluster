# Infisical standalone 1.7.2 (PostgreSQL + Redis) - https://infisical.com/docs/self-hosting/deployments/kubernetes
# Create a Secret "infisical-secrets" in namespace infisical with required backend env vars
# (ENCRYPTION_KEY, JWT_*_SECRET, SMTP_*, SITE_URL, etc.) before sync.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infisical
spec:
  project: base
  source:
    repoURL: https://github.com/jyje/cluster
    targetRevision: main
    path: helm/infisical/infisical-standalone-1.7.2
    helm:
      valuesObject:
        infisical:
          kubeSecretRef: infisical-secrets
          # 1 replica to avoid pg-boss queue init deadlock when multiple pods start (DDL contention)
          replicaCount: 1
        # Use Valkey (Redis-compatible); password from secret mounted as file
        redis:
          auth:
            usePasswordFiles: true
          image:
            registry: registry-1.docker.io
            repository: valkey/valkey
            tag: "7.2.11"
          master:
            command: ["sh", "-c"]
            args:
              - "valkey-server --requirepass \"$(cat /opt/bitnami/redis/secrets/redis-password)\""
        # PostgreSQL: credentials from Secret (SealedSecret infisical-postgresql), mounted as files
        postgresql:
          auth:
            existingSecret: infisical-postgresql
            usePasswordFiles: true
          primary:
            # Ensure infisical role and DB exist (idempotent). Run init scripts as postgres (default runs as custom user which doesn't exist yet).
            initdb:
              user: postgres
              scripts:
                create-infisical.sql: |
                  DO $$
                  BEGIN
                    IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'infisical') THEN
                      CREATE USER infisical WITH PASSWORD 'root';
                    END IF;
                    IF NOT EXISTS (SELECT 1 FROM pg_database WHERE datname = 'infisicalDB') THEN
                      CREATE DATABASE infisicalDB OWNER infisical;
                    END IF;
                  END $$;
            livenessProbe:
              initialDelaySeconds: 120
            readinessProbe:
              initialDelaySeconds: 60
            # Give initdb time on first run (slow storage); avoid liveness killing during init
            startupProbe:
              enabled: true
              initialDelaySeconds: 60
              periodSeconds: 10
              failureThreshold: 36   # 60 + 36*10 = 420s (7 min) before startup fails
        ingress:
          enabled: true
          ingressClassName: nginx
          nginx:
            enabled: false  # use cluster's existing nginx ingress; do not deploy subchart
          hostName: infisical.app.jyje.online
          annotations:
            cert-manager.io/cluster-issuer: nginx-letsencrypt-prod
          tls:
            - secretName: infisical-letsencrypt-tls
              hosts:
                - infisical.app.jyje.online
  destination:
    server: https://kubernetes.default.svc
    namespace: infisical
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated: {}
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: infisical-secrets
  namespace: infisical
spec:
  encryptedData:
    AUTH_SECRET: 
    ENCRYPTION_KEY: 
    SITE_URL: 
  template:
    metadata:
      name: infisical-secrets
      namespace: infisical
    type: Opaque
---
# PostgreSQL credentials (see secrets/infisical/README.md). Chart mounts this secret under /opt/bitnami/postgresql/secrets/.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: infisical-postgresql
  namespace: infisical
spec:
  encryptedData:
    # Run once and paste output here (see secrets/infisical/README.md):
    # kubectl create secret generic infisical-postgresql -n infisical --from-literal=postgres-password=CHANGE_ME --from-literal=password=root --dry-run=client -o yaml | kubeseal --controller-name sealed-secrets -o yaml
    postgres-password: 
    password: 
  template:
    metadata:
      name: infisical-postgresql
      namespace: infisical
    type: Opaque
