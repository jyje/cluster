apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homer-instance
spec:
  project: base
  source:
    repoURL: https://github.com/jyje/cluster
    targetRevision: main
    path: helm/jyje/manifest-group-0.1.0
    helm:
      valuesObject:
        manifests:
          # Extra Homer pages (About/Stack), mirrored verbatim from the
          # jyje/homer fork (jyje branch). Mounted into /www/assets/ via
          # assets.configMapRef on the Dashboard below; Homer's frontend
          # picks up <name>.yml as the #<name> anchor page automatically.
          - apiVersion: v1
            kind: ConfigMap
            metadata:
              name: homer-assets
              namespace: "{{ .Release.Namespace }}"
            data:
              about.yml: |
                ---
                # Additional 'about' page configuration
                title: About
                message: |
                  I'm Jeayoung Jeon. If you want to know more about me, please visit my personal website <a href="https://jyje.online">Jeayoung Jeon</a>.
                services:
                  - name: Links
                    icon: fas fa-layer-group
                    items:
                      - name: jyje.online
                        logo: https://app.jyje.online/assets/icons/pwa-192x192.png
                        url: https://jyje.online
              stack.yml: |
                ---
                # Additional 'stack' page configuration
                title: Stack
                message: ~
                services:
                  - name: Infra
                    icon: fas fa-server
                    items:
                      - name: Raspberry Pi (2x4B, 2x5B)
                        logo: https://upload.wikimedia.org/wikipedia/en/c/cb/Raspberry_Pi_Logo.svg
                        subtitle: ARM64-based Micro Computers
                        tag: "raspi #arm #edge #iot #infra"
                        url: https://www.raspberrypi.com
                      - name: MicroK8s v1.36.2
                        logo: https://cdn.simpleicons.org/kubernetes
                        subtitle: Lightweight Kubernetes for Edge Devices
                        tag: "microk8s #cluster #k8s #canonical #infra"
                        url: https://microk8s.io
                      - name: Noctua NF-A12x25 PWM
                        logo: https://raw.githubusercontent.com/jyje/homer/jyje/public/assets/tools/noctua-logo.png
                        subtitle: Silent Fan controlled by Raspberry Pi
                        tag: "noctua #cooling #fan #pwm #infra"
                        url: https://noctua.at/en/nf-a12x25-pwm
                      - name: ipTIME A3004NS-M
                        logo: https://raw.githubusercontent.com/jyje/homer/jyje/public/assets/tools/iptime-logo.webp
                        subtitle: Home Router for Ingress Traffic
                        tag: "iptime #router #network #infra"
                        url: https://iptime.com/iptime
                      - name: NVIDIA GeForce GTX 1660 Ti
                        logo: https://cdn.simpleicons.org/nvidia
                        subtitle: AMD64 with Ubuntu 22.04 LTS
                        tag: "nvidia #gpu #ai #ml"
                        url: https://www.nvidia.com/en-us/geforce/graphics-cards/compare/?section=compare-16
                  - name: CI/CD
                    icon: fas fa-arrows-spin
                    items:
                      - name: Argo CD
                        logo: https://argo-cd.readthedocs.io/en/stable/assets/logo.png
                        subtitle: App deployment
                        tag: "argocd #argo #gitops #cicd"
                        url: https://github.com/argoproj/argo-cd
                      - name: GitHub ARC
                        logo: https://avatars.githubusercontent.com/in/15368
                        subtitle: Self-hosted ARM64 runners
                        tag: "github-actions #runner #cicd"
                        url: https://github.com/actions/actions-runner-controller
                  - name: Database
                    icon: fas fa-database
                    items:
                      - name: CloudNativePG
                        logo: https://cloudnative-pg.io/images/hero_image.svg
                        subtitle: PostgreSQL operator
                        tag: "cnpg #operator #dbaas #psql #database"
                        url: https://github.com/cloudnative-pg/cloudnative-pg
                      - name: Qdrant
                        logo: https://avatars.githubusercontent.com/u/73504361
                        subtitle: Vector database
                        tag: "qdrant #vectordb #ai"
                        url: https://github.com/qdrant/qdrant
                  - name: Storage
                    icon: fas fa-hdd
                    items:
                      - name: NFS Subdir External Provisioner
                        logo: https://avatars.githubusercontent.com/kubernetes-sigs
                        subtitle: Dynamic NFS-backed storage classes
                        tag: "nfs #storageclass #storage #kubernetes-sigs"
                        url: https://github.com/kubernetes-sigs/nfs-subdir-external-provisioner
                  - name: Observability
                    icon: fas fa-chart-line
                    items:
                      - name: Grafana
                        logo: https://grafana.com/static/img/menu/grafana2.svg
                        subtitle: Cluster monitoring dashboards
                        tag: "grafana #monitoring #dashboard #lgtm"
                        url: https://github.com/grafana/grafana
                      - name: Loki
                        logo: https://grafana.com/static/img/menu/loki.svg
                        subtitle: Log aggregation
                        tag: "loki #logging #lgtm #observability"
                        url: https://github.com/grafana/loki
                      - name: Prometheus
                        logo: https://cdn.simpleicons.org/prometheus
                        subtitle: Metrics collection and alerting
                        tag: "prometheus #metrics #monitoring #lgtm"
                        url: https://github.com/prometheus/prometheus
                      - name: Tempo
                        logo: https://raw.githubusercontent.com/grafana/tempo/main/docs/sources/tempo/logo_and_name.png
                        subtitle: Distributed tracing
                        tag: "tempo #tracing #lgtm #observability"
                        url: https://github.com/grafana/tempo
                  - name: AI/LLM
                    icon: fas fa-flask
                    items:
                      - name: LiteLLM
                        logo: https://raw.githubusercontent.com/googlefonts/noto-emoji/main/svg/emoji_u1f684.svg
                        subtitle: LLM API gateway / proxy
                        tag: "litellm #llm #proxy #gateway #openai"
                        url: https://github.com/BerriAI/litellm
                      - name: Open WebUI
                        logo: https://docs.openwebui.com/images/logo.png
                        subtitle: Open source web UI for LLM
                        tag: "open-webui #ollama #llm #webui"
                        url: https://github.com/open-webui/open-webui
                      - name: Ollama
                        logo: https://ollama.com/public/ollama.png
                        subtitle: Open source LLM and embeddings
                        tag: "ollama #llm #open-source #ai"
                        url: https://ollama.com/library
            binaryData:
              # Custom favicon mirrored from the jyje.online profile site
              # (https://jyje.online/assets/icons/favicon.ico) for brand consistency.
              # The operator extracts binaryData[<key>] and places it at
              # /www/assets/icons/favicon.ico, selected via assets.icons.favicon below.
              favicon.ico: 
          - apiVersion: homer.rajsingh.info/v1alpha1
            kind: Dashboard
            metadata:
              name: homer
              namespace: "{{ .Release.Namespace }}"
            spec:
              replicas: 2
              # Mostly manual curation (mirrors the retired homer-legacy-jyje's
              # config.yml) to keep the curated card layout, but n8n is opted in
              # to Ingress-based auto-discovery as a worked example: matching on
              # the chart's own standard label (app.kubernetes.io/name=n8n) scopes
              # this to just that one Ingress instead of "match everything"
              # (the unset default), which would duplicate every other app's card.
              ingressSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values:
                      - n8n
                      - open-webui
                      - litellm
                      - portainer
                      - argocd-server
                      - homer
                      - grafana
              assets:
                configMapRef:
                  name: homer-assets
                icons:
                  # Mounts binaryData['favicon.ico'] from homer-assets into
                  # /www/assets/icons/favicon.ico (replaces Homer's default favicon).
                  favicon: "favicon.ico"
              homerConfig:
                title: "jyje's Kubernetes"
                subtitle: "app.jyje.online"
                logo: "https://raw.githubusercontent.com/jyje/homer/jyje/public/assets/icons/pwa-192x192.png"
                connectivityCheck: true
                defaults:
                  layout: columns
                  colorTheme: light
                header: true
                footer: |
                  2023 - 2026 ⓒ <a href="https://app.jyje.online">app.jyje.online</a>
                  with <a href="https://jyje.online">Jeayoung Jeon</a>.
                  Powered by <a href="https://github.com/bastienwirtz/homer">Homer</a>.
                theme: default
                colors:
                  light:
                    highlight-primary: "#680C2C"
                    highlight-secondary: "#340616"
                    highlight-hover: "#680C2C"
                    background: "#fafafa"
                    card-background: "#ffffff"
                    text: "#363636"
                    text-header: "#ffffff"
                    text-title: "#303030"
                    text-subtitle: "#424242"
                    card-shadow: "rgba(0, 0, 0, 0.1)"
                    link: "#3273dc"
                    link-hover: "#363636"
                  dark:
                    highlight-primary: "#680C2C"
                    highlight-secondary: "#340616"
                    highlight-hover: "#680C2C"
                    background: "#212631"
                    card-background: "#2b2b2b"
                    text: "#eaeaea"
                    text-header: "#ffffff"
                    text-title: "#fafafa"
                    text-subtitle: "#f5f5f5"
                    card-shadow: "rgba(0, 0, 0, 0.4)"
                    link: "#3273dc"
                    link-hover: "#ffdd57"
                message:
                  style: "is-dark"
                  title: "NOTICE"
                  icon: "fas fa-info"
                  content: |
                    This is a collection of applications for my demo cluster. It is not intended for production use.
                links:
                  - name: "Dashboard"
                    icon: "fas fa-file-alt"
                    url: "#"
                  - name: "Stack"
                    icon: "fas fa-layer-group"
                    url: "#stack"
                  - name: "About"
                    icon: "fas fa-user-astronaut"
                    url: "#about"
                # Almost every card is discovered automatically from each app's
                # Ingress annotations (see ingressSelector above), which build the
                # groups via service.homer.rajsingh.info/name:
                #   Applications — n8n, Open WebUI, LiteLLM
                #   Dashboards   — Grafana, Homer
                #   Management   — Argo CD, Portainer
                # This manual block only adds Hermes Agent, which has NO Ingress
                # (it runs as a Discord gateway — outbound only, no web endpoint),
                # so it can't be auto-discovered. It joins the "Applications" group
                # by name; the operator merges same-named manual + discovered groups.
                services:
                  - parameters:
                      name: "Applications"
                      icon: "fas fa-rocket"
                    items:
                      # Infisical is intentionally hidden from the dashboard for now
                      # (its Ingress carries no Homer annotations, and it has no
                      # manual card here).
                      - parameters:
                          name: "Hermes Agent"
                          # No web dashboard exposed: Hermes runs as a Discord
                          # gateway (outbound only), so there is no endpoint to link
                          # or health-check. Link to the chart repo instead; no
                          # "type" (Ping) for the same reason.
                          logo: "https://hermes-agent.nousresearch.com/docs/img/logo.png"
                          subtitle: "Multi-provider LLM Discord agent"
                          tag: "hermes-agent #discord #llm #agent"
                          url: "https://github.com/jyje/hermes-agent-helm"

          # Chart has no built-in ingress template; the operator names the
          # generated Service "<dashboard-name>-homer" (confirmed post-deploy).
          - apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              name: homer
              namespace: "{{ .Release.Namespace }}"
              # Unlike vendored charts, this is a raw resource we fully control,
              # so a custom discovery label can be added directly (no need to
              # match on a pre-existing standard label).
              labels:
                app.kubernetes.io/name: homer
              annotations:
                cert-manager.io/cluster-issuer: nginx-letsencrypt-prod
                # Discovered by this same Dashboard CR via ingressSelector
                # (matchExpressions: app.kubernetes.io/name in [...]) — the
                # dashboard discovers its own Ingress.
                item.homer.rajsingh.info/name: "Homer"
                item.homer.rajsingh.info/subtitle: "This dashboard"
                item.homer.rajsingh.info/logo: "https://raw.githubusercontent.com/bastienwirtz/homer/main/public/logo.png"
                item.homer.rajsingh.info/tag: "homer #dashboard #monitoring"
                item.homer.rajsingh.info/type: "Ping"
                service.homer.rajsingh.info/name: "Dashboards"
                service.homer.rajsingh.info/icon: "fas fa-chart-line"
            spec:
              ingressClassName: nginx
              tls:
                - secretName: app.jyje.online
                  hosts:
                    - app.jyje.online
              rules:
                - host: app.jyje.online
                  http:
                    paths:
                      - path: /
                        pathType: Prefix
                        backend:
                          service:
                            name: homer-homer
                            port:
                              number: 80

          # assets.configMapRef mounts via subPath, which kubelet does not
          # live-reload, and the homer-operator controller does not watch the
          # referenced ConfigMap for changes (only the Dashboard CR's own
          # spec). Force a rollout restart after every sync so about.yml/
          # stack.yml edits actually take effect. Scoped to this Application
          # so it only fires on dashboard-content changes, not operator
          # chart/value changes.
          - apiVersion: v1
            kind: ServiceAccount
            metadata:
              name: homer-restart-hook
              namespace: "{{ .Release.Namespace }}"
          - apiVersion: rbac.authorization.k8s.io/v1
            kind: Role
            metadata:
              name: homer-restart-hook
              namespace: "{{ .Release.Namespace }}"
            rules:
              - apiGroups: ["apps"]
                resources: ["deployments"]
                verbs: ["get", "patch"]
          - apiVersion: rbac.authorization.k8s.io/v1
            kind: RoleBinding
            metadata:
              name: homer-restart-hook
              namespace: "{{ .Release.Namespace }}"
            subjects:
              - kind: ServiceAccount
                name: homer-restart-hook
                namespace: "{{ .Release.Namespace }}"
            roleRef:
              kind: Role
              name: homer-restart-hook
              apiGroup: rbac.authorization.k8s.io
          - apiVersion: batch/v1
            kind: Job
            metadata:
              name: homer-restart-hook
              namespace: "{{ .Release.Namespace }}"
              annotations:
                argocd.argoproj.io/hook: PostSync
                argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
            spec:
              backoffLimit: 2
              template:
                spec:
                  serviceAccountName: homer-restart-hook
                  restartPolicy: Never
                  containers:
                    - name: restart
                      image: alpine/k8s:1.36.2
                      command:
                        - sh
                        - -c
                        # Tolerate the deployment not existing yet on first install
                        # (the operator creates it asynchronously after this sync).
                        - kubectl rollout restart deployment/homer-homer -n "{{ .Release.Namespace }}" || true

  destination:
    server: https://kubernetes.default.svc
    namespace: homer-instance
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
