apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: error-pages
  annotations:
    # Must exist before ingress-nginx's default-backend-service extraArg
    # points at it, so keep it in an earlier sync-wave (ingress-nginx has
    # no wave set, i.e. the default "0").
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: base
  source:
    repoURL: https://github.com/jyje/cluster
    targetRevision: main
    path: helm/error-pages/error-pages-4.2.4
    helm:
      valuesObject:
        config:
          # error-pages must echo back the real HTTP status code (503, 404, ...)
          # instead of 200, or the original error is lost through the proxy.
          sendSameHttpCode: true
          # Internal details (namespace, ingress/service name, service port,
          # request ID) must not be shown to visitors.
          showDetails: false
          # "Go to homepage" link, rendered by the app-down template below.
          homepageUrl: "https://app.jyje.online"
          htmlTemplate:
            # Built-in template. No custom logo here: app-down's markup has
            # no <img>/logo slot at all (fully CSS/SVG-drawn illustration),
            # so injecting one would mean forking the whole ~40KB template
            # instead of adding it naturally — skipped per instruction.
            name: app-down

        extraResources:
          # Exposes the error-pages service directly for browsing/testing,
          # separate from its role as ingress-nginx's default backend.
          - apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              name: error-pages
              namespace: "{{ .Release.Namespace }}"
              annotations:
                cert-manager.io/cluster-issuer: nginx-letsencrypt-prod
            spec:
              ingressClassName: nginx
              tls:
                - secretName: error.app.jyje.online
                  hosts:
                    - error.app.jyje.online
              rules:
                - host: error.app.jyje.online
                  http:
                    paths:
                      - path: /
                        pathType: Prefix
                        backend:
                          service:
                            name: error-pages
                            port:
                              number: 8080
  destination:
    server: https://kubernetes.default.svc
    namespace: error-pages
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
