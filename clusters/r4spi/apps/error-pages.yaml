apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: error-pages
  annotations:
    # Must exist before ingress-nginx's default-backend-service extraArg
    # points at it, so keep it in an earlier sync-wave (ingress-nginx has
    # no wave set, i.e. the default "0").
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: base
  source:
    repoURL: https://github.com/jyje/cluster
    targetRevision: main
    path: helm/error-pages/error-pages-4.2.4
    helm:
      valuesObject:
        config:
          # error-pages must echo back the real HTTP status code (503, 404, ...)
          # instead of 200, or the original error is lost through the proxy.
          sendSameHttpCode: true
          # Reads ingress-nginx's X-Original-URI/X-Namespace/X-Ingress-Name/
          # X-Service-Name/X-Service-Port headers for richer error context.
          showDetails: true
          htmlTemplate:
            # Dark theme, matches Homer's dashboard theme.
            name: l7

        extraResources:
          # Exposes the error-pages service directly for browsing/testing,
          # separate from its role as ingress-nginx's default backend.
          - apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              name: error-pages
              namespace: "{{ .Release.Namespace }}"
              annotations:
                cert-manager.io/cluster-issuer: nginx-letsencrypt-prod
            spec:
              ingressClassName: nginx
              tls:
                - secretName: error.app.jyje.online
                  hosts:
                    - error.app.jyje.online
              rules:
                - host: error.app.jyje.online
                  http:
                    paths:
                      - path: /
                        pathType: Prefix
                        backend:
                          service:
                            name: error-pages
                            port:
                              number: 8080
  destination:
    server: https://kubernetes.default.svc
    namespace: error-pages
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
