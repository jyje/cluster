apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: error-pages
  annotations:
    # Must exist before ingress-nginx's default-backend-service extraArg
    # points at it, so keep it in an earlier sync-wave (ingress-nginx has
    # no wave set, i.e. the default "0").
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: base
  source:
    repoURL: https://github.com/jyje/cluster
    targetRevision: main
    path: helm/error-pages/error-pages-4.2.4
    helm:
      valuesObject:
        config:
          # error-pages must echo back the real HTTP status code (503, 404, ...)
          # instead of 200, or the original error is lost through the proxy.
          sendSameHttpCode: true
          # Internal details (namespace, ingress/service name, service port,
          # request ID) must not be shown to visitors — the custom template
          # below doesn't render them either way, but keep this off too.
          showDetails: false
          # "Go to homepage" link in the custom template below.
          homepageUrl: "https://app.jyje.online"
          htmlTemplate:
            # Minimal custom page: status code + message + blog avatar only
            # (no internal request details), dark theme matching Homer's
            # dashboard color palette (see homer-instance.yaml colors.dark).
            custom: |
              <!DOCTYPE html>
              <html lang="en">
              <head>
                <meta charset="utf-8">
                <meta name="robots" content="nofollow,noarchive,noindex">
                <title>{{ .StatusCode }} — {{ .Message }}</title>
                <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <style>
                  :root {
                    --bg: #212631;
                    --card: #2b2b2b;
                    --text: #eaeaea;
                    --accent: #680C2C;
                    --link: #3273dc;
                    --link-hover: #ffdd57;
                  }
                  html, body {
                    margin: 0; padding: 0; height: 100%; width: 100%;
                    background: var(--bg); color: var(--text);
                    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                    display: flex; align-items: center; justify-content: center;
                  }
                  main {
                    text-align: center;
                    padding: 2.5em 3em;
                    background: var(--card);
                    border-radius: 12px;
                    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
                    max-width: 90vw;
                  }
                  img.brand {
                    width: 96px; height: 96px; border-radius: 50%;
                    object-fit: cover; margin-bottom: 1.2em;
                    box-shadow: 0 0 0 3px var(--accent);
                  }
                  h1 { font-size: 3em; margin: 0; font-weight: 600; color: var(--accent); }
                  p.message { font-size: 1.2em; margin: 0.4em 0 1.5em; opacity: 0.85; }
                  a { color: var(--link); text-decoration: none; font-size: 0.95em; }
                  a:hover { color: var(--link-hover); }
                </style>
              </head>
              <body>
                <main>
                  <img class="brand" src="https://raw.githubusercontent.com/jyje/blog/main/quartz/static/og-image.png" alt="jyje">
                  <h1>{{ .StatusCode }}</h1>
                  <p class="message">{{ .Message }}</p>
                  {{ if .HomepageURL }}<a href="{{ .HomepageURL }}">← Go to homepage</a>{{ end }}
                </main>
              </body>
              </html>

        extraResources:
          # Exposes the error-pages service directly for browsing/testing,
          # separate from its role as ingress-nginx's default backend.
          - apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              name: error-pages
              namespace: "{{ .Release.Namespace }}"
              annotations:
                cert-manager.io/cluster-issuer: nginx-letsencrypt-prod
            spec:
              ingressClassName: nginx
              tls:
                - secretName: error.app.jyje.online
                  hosts:
                    - error.app.jyje.online
              rules:
                - host: error.app.jyje.online
                  http:
                    paths:
                      - path: /
                        pathType: Prefix
                        backend:
                          service:
                            name: error-pages
                            port:
                              number: 8080
  destination:
    server: https://kubernetes.default.svc
    namespace: error-pages
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
