apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: n8n
spec:
  project: ai
  source:
    repoURL: https://github.com/jyje/cluster
    targetRevision: main
    path: helm/n8n/n8n-2.0.1
    helm:
      valueFiles:
        - values.yaml
      valuesObject:
        image:
          tag: "2.6.2"
          pullPolicy: IfNotPresent
        ingress:
          enabled: true
          className: nginx
          annotations:
            cert-manager.io/cluster-issuer: nginx-letsencrypt-prod
            nginx.ingress.kubernetes.io/configuration-snippet: |
              more_set_headers "Access-Control-Allow-Origin: $http_origin";
            nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
            nginx.ingress.kubernetes.io/cors-allow-headers: X-Api-Key
            nginx.ingress.kubernetes.io/cors-allow-methods: HEAD
            nginx.ingress.kubernetes.io/enable-cors: "true"
            # Discovered by Homer's Dashboard CR via ingressSelector
            # (matchLabels: app.kubernetes.io/name=n8n, the chart's own standard
            # label — the chart has no values field to add a custom label).
            item.homer.rajsingh.info/name: "n8n"
            item.homer.rajsingh.info/subtitle: "Workflow automation"
            item.homer.rajsingh.info/logo: "https://avatars.githubusercontent.com/u/45487711"
            item.homer.rajsingh.info/tag: "n8n #workflow #automation #cicd"
            item.homer.rajsingh.info/type: "Ping"
            service.homer.rajsingh.info/name: "Applications"
            service.homer.rajsingh.info/icon: "fas fa-rocket"
          hosts:
            - host: n8n.app.jyje.online
              paths:
                - path: /
                  pathType: Prefix
          tls:
            - secretName: n8n.app.jyje.online
              hosts:
                - n8n.app.jyje.online
        main:
          persistence:
            enabled: true
            type: dynamic
            storageClass: subdir-usb
            accessModes:
              - ReadWriteOnce
            size: 10Gi
          replicaCount: 1
          service:
            enabled: true
            type: ClusterIP
            port: 80
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
        valkey:
          enabled: true
  destination:
    namespace: n8n
    server: 'https://kubernetes.default.svc'
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated: {}
