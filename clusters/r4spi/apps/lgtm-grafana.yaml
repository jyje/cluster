apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: base
  source:
    repoURL: https://github.com/jyje/cluster
    targetRevision: main
    path: helm/grafana/grafana-10.5.15
    helm:
      valuesObject:
        replicas: 1

        deploymentStrategy:
          type: Recreate

        # First-boot DB migration against the new CNPG-backed database can take
        # longer than the chart's default 160s liveness budget (60s delay + 10x10s)
        # on RPi hardware, especially while the CNPG cluster itself is still
        # settling. Extend to a 300s budget; this chart has no startupProbe
        # support for the main container, so the liveness probe carries it.
        livenessProbe:
          failureThreshold: 24

        # Default readiness timeout (1s) can flap under DB/CPU load; raise it.
        readinessProbe:
          timeoutSeconds: 5

        admin:
          existingSecret: grafana-admin-creds
          userKey: admin-user
          passwordKey: admin-password

        env:
          GF_SECURITY_DISABLE_INITIAL_ADMIN_CREATION: "true"

        envValueFrom:
          GF_DATABASE_USER:
            secretKeyRef:
              name: grafana-pg-app
              key: username
          GF_DATABASE_PASSWORD:
            secretKeyRef:
              name: grafana-pg-app
              key: password

        grafana.ini:
          database:
            type: postgres
            host: grafana-pg-rw.observability:5432
            name: grafana
            ssl_mode: require

        ingress:
          enabled: true
          ingressClassName: nginx
          annotations:
            cert-manager.io/cluster-issuer: nginx-letsencrypt-prod
            nginx.ingress.kubernetes.io/configuration-snippet: |
              more_set_headers "Access-Control-Allow-Origin: $http_origin";
            nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
            nginx.ingress.kubernetes.io/cors-allow-headers: X-Api-Key
            nginx.ingress.kubernetes.io/cors-allow-methods: HEAD
            nginx.ingress.kubernetes.io/enable-cors: "true"
            # Discovered by Homer's Dashboard CR via ingressSelector
            # (matchExpressions: app.kubernetes.io/name in [...]).
            item.homer.rajsingh.info/name: "Grafana"
            item.homer.rajsingh.info/subtitle: "Cluster monitoring"
            item.homer.rajsingh.info/logo: "https://grafana.com/static/img/menu/grafana2.svg"
            item.homer.rajsingh.info/tag: "grafana #monitoring #dashboard #lgtm"
            item.homer.rajsingh.info/type: "Ping"
            service.homer.rajsingh.info/name: "Dashboards"
            service.homer.rajsingh.info/icon: "fas fa-chart-line"
          hosts:
            - grafana.app.jyje.online
          tls:
            - secretName: grafana.app.jyje.online
              hosts:
                - grafana.app.jyje.online

        persistence:
          enabled: true
          storageClassName: subdir-usb
          size: 5Gi

        datasources:
          datasources.yaml:
            apiVersion: 1
            datasources:
              - name: Prometheus
                type: prometheus
                uid: prometheus
                url: http://prometheus-kube-prometheus-prometheus.observability:9090
                isDefault: true
                jsonData:
                  timeInterval: 30s
              - name: Loki
                type: loki
                uid: loki
                url: http://loki.observability:3100
                jsonData:
                  maxLines: 1000
              - name: Tempo
                type: tempo
                uid: tempo
                url: http://tempo-distributed.observability:3100
                jsonData:
                  tracesToLogsV2:
                    datasourceUid: loki
                  tracesToMetrics:
                    datasourceUid: prometheus
                  serviceMap:
                    datasourceUid: prometheus

        # Dashboard provisioning (dashboardProviders/dashboards) has moved to
        # grafana-operator's GrafanaDashboard CRs — see grafana-crds.yaml.
        # This chart is left otherwise untouched; the migration is purely a
        # values-level change to avoid two mechanisms managing the same
        # dashboards.
        #
        # TEMPORARY: re-provisioning the same "default" file provider with no
        # dashboards forces Grafana to auto-delete the two dashboards it still
        # has marked provisioned=true from before the migration (kubernetes-
        # cluster uid os6Bh8Omk, node-exporter uid rYdddlPWk). Their stale
        # provisioned flag blocks grafana-operator's delete-then-recreate sync
        # (HTTP 400 on DELETE /dashboards/uid/{uid}). Revert this block once
        # grafana-operator reports DashboardSynchronized=True for both.
        dashboardProviders:
          dashboardproviders.yaml:
            apiVersion: 1
            providers:
              - name: default
                orgId: 1
                folder: ""
                type: file
                disableDeletion: false
                editable: true
                options:
                  path: /var/lib/grafana/dashboards/default

        extraResources:
          - apiVersion: bitnami.com/v1alpha1
            kind: SealedSecret
            metadata:
              name: grafana-admin-creds
            spec:
              encryptedData:
                admin-password: 
                admin-user: 
              template:
                metadata:
                  name: grafana-admin-creds
                type: Opaque

          - apiVersion: postgresql.cnpg.io/v1
            kind: Cluster
            metadata:
              name: grafana-pg
            spec:
              instances: 3
              storage:
                size: 2Gi
              bootstrap:
                initdb:
                  database: grafana
                  owner: grafana
              topologySpreadConstraints:
                - maxSkew: 1
                  topologyKey: kubernetes.io/hostname
                  whenUnsatisfiable: DoNotSchedule
                  labelSelector:
                    matchLabels:
                      cnpg.io/cluster: grafana-pg
              failoverDelay: 30
              postgresql:
                parameters:
                  wal_sender_timeout: 60s
                  wal_receiver_timeout: 60s
                  wal_keep_size: 2048MB

  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
