---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-cd
spec:
  project: base
  source:
    repoURL: https://github.com/jyje/cluster
    targetRevision: main
    path: helm/argo/argo-cd-9.5.4
    helm:
      valuesObject:
        fullnameOverride: argo-cd
        global:
          domain: cd.app.jyje.online
          image:
            repository: quay.io/argoproj/argocd
            tag: "v3.3.8"
        configs:
          params:
            server.insecure: true
          secret:
            argocdServerAdminPassword: "$2a$10$Fxz3iaT9JpTioBr8vPRvYONv5kRrdxfX1KHck46ueCPMl.Qmr.Rhq"
            argocdServerAdminPasswordMtime: "2025-10-07T07:31:00Z"
        controller:
          replicas: 1
          metrics:
            enabled: true
        dex:
          enabled: false
        server:
          replicas: 2
          ingress:
            enabled: true
            annotations:
              cert-manager.io/cluster-issuer: nginx-letsencrypt-prod
              nginx.ingress.kubernetes.io/configuration-snippet: |
                more_set_headers "Access-Control-Allow-Origin: $http_origin";
              nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
              nginx.ingress.kubernetes.io/cors-allow-headers: X-Api-Key
              nginx.ingress.kubernetes.io/cors-allow-methods: HEAD
              nginx.ingress.kubernetes.io/enable-cors: "true"
            ingressClassName: nginx
            tls: true
        repoServer:
          replicas: 1
        extraObjects:
          - apiVersion: argoproj.io/v1alpha1
            kind: AppProject
            metadata:
              name: base
              namespace: argocd
            spec:
              clusterResourceWhitelist:
                - group: '*'
                  kind: '*'
              destinations:
                - namespace: '*'
                  server: https://kubernetes.default.svc
              sourceRepos:
                - '*'
          - apiVersion: argoproj.io/v1alpha1
            kind: AppProject
            metadata:
              name: ai
              namespace: argocd
            spec:
              clusterResourceWhitelist:
                - group: '*'
                  kind: '*'
              destinations:
                - namespace: '*'
                  server: https://kubernetes.default.svc
              sourceRepos:
                - '*'
          - apiVersion: argoproj.io/v1alpha1
            kind: AppProject
            metadata:
              name: default
              namespace: argocd
            spec:
              clusterResourceWhitelist:
                - group: '*'
                  kind: '*'
              destinations:
                - namespace: '*'
                  server: https://kubernetes.default.svc
              sourceRepos:
                - '*'
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
