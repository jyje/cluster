apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hermes-agent
  namespace: argocd
spec:
  project: ai
  source:
    repoURL: https://github.com/jyje/hermes-agent-helm
    targetRevision: main
    path: charts/hermes-agent
    helm:
      valuesObject:
        config:
          # Register the proxy as a custom OpenAI-compatible provider. The key
          # ("litellm") is the provider id referenced by model.provider below.
          providers:
            litellm:
              base_url: '${OPENAI_BASE_URL}'
              key_env: 'OPENAI_API_KEY'    # env var that holds the proxy key
              discover_models: true        # populate the model picker from /v1/models
          model:
            provider: litellm
            # Must match a model name exposed by the proxy (see /v1/models).
            default: nvidia/nemotron-3-nano-omni-30b-a3b-reasoning
          terminal:
            backend: local
        extraEnvFrom:
          - secretRef:
              name: hermes-agent-creds
        extraResources:
          - apiVersion: bitnami.com/v1alpha1
            kind: SealedSecret
            metadata:
              name: hermes-agent-creds
            spec:
              encryptedData:
                DISCORD_BOT_TOKEN: 
                DISCORD_HOME_CHANNEL: 
                OPENAI_API_KEY: 
                OPENAI_BASE_URL: 
              template:
                metadata:
                  name: hermes-agent-creds
                  namespace: hermes-agent
                type: Opaque
  destination:
    server: https://kubernetes.default.svc
    namespace: hermes-agent
  syncPolicy:
    automated: {}
    syncOptions:
      - CreateNamespace=true
