apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: qdrant
spec:
  project: ai
  source:
    repoURL: https://github.com/jyje/cluster
    targetRevision: main
    path: helm/qdrant/qdrant-1.17.1
    helm:
      valueFiles:
        - values.yaml
      valuesObject:
        replicaCount: 1
        nodeSelector:
          # Qdrant mmap/allocators fail on 16KB pages, force RPi 4 (4KB page size)
          app.jyje.live/node.family: raspberry-pi
          app.jyje.live/raspi.type: 4b
        apiKey: "adminqdrant123"
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            memory: "1Gi"
        persistence:
          storageClassName: "subdir-usb"
          size: "2Gi"
        snapshotPersistence:
          storageClassName: "subdir-usb"
          size: "1Gi"
  destination:
    namespace: ollama-system
    server: 'https://kubernetes.default.svc'
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated: {}
